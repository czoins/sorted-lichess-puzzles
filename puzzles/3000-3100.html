<!DOCTYPE html>
<html>
<head>
<title>Puzzles: 3000-3100</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  --bkg-color: white;
  --title-link: #b58863;
  --rating: #f0d9b5;
  --border: #ededed;
}
body.dark-theme {
  --bkg-color: #3B3B3B;
  --title-link: #B59B89;
  --rating: #DACBB5;
  --border: #121212;
}

@media (prefers-color-scheme: dark) {
  /* defaults to dark theme */
  body {
    --bkg-color: #3B3B3B;
    --title-link: #B59B89;
    --rating: #DACBB5;
    --border: #121212;
  }
  body.light-theme {
    --bkg-color: white;
    --title-link: #b58863;
    --rating: #f0d9b5;
    --border: #ededed;
  }
}

body {
  background-color: var(--bkg-color);
  font-family: "arial", sans-serif;
  line-height: 1.25;
}

.btn-toggle {
  filter: invert(1);
}

table {
  <!-- border: 1px solid var(--border); -->
  border-collapse: collapse;
  margin: 0;
  padding: 0;
  width: 30%;
  table-layout: fixed;
}

table caption {
  font-size: 1.75em;
  color: var(--title-link);
  margin: .5em 0 1.45em;
  caption-side: top;
  text-align: center;
  <!-- text-transform: uppercase; -->
}

table tr {
  border: 1px solid var(--border);
  padding: .35em;
}

table th,
table td {
  padding: .525em;
  text-align: center;
  text-overflow: ellipsis; 
  word-wrap: break-word;
  <!-- border: 1px solid var(--border); -->
  overflow: hidden;
}

table th {
  font-size: .85em;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--rating);
}

@media screen and (max-width: 600px) {
  table {
  <!-- border: 1px solid var(--border); -->
  border-collapse: collapse;
  margin: 0;
  padding: 0;
  width: 100%;
  table-layout: fixed;
  }
}

a {color: var(--title-link);}
a:visited {color:grey;}

</style>
</head>
<body>

<input align="right" type="image" class="btn-toggle" src="https://cdn4.iconfinder.com/data/icons/music-ui-solid-24px/24/moon_dark_mode_night-2-32.png">

<table style="margin-left:auto;margin-right:auto;">
  <caption><strong>Puzzles: 3000-3100</strong></caption>
  <thead>
  <tr>
    <th scope="col">Puzzle</th>
    <th scope="col">Rating</th>
  </tr>
  </thead>
  <tbody>
  <tr>
    <td data-label="Puzzle"><a href="https://lichess.org/training/125224" style="text-decoration:none">125224</a></td>
    <td data-label="Rating"><span style="color: var(--rating);font-family: arial, sans-serif;">3021</span></td>
  </tr>
  <tbody>
</table>

<script>
const btn = document.querySelector(".btn-toggle");
const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");

const currentTheme = localStorage.getItem("theme");
if (currentTheme == "dark") {
  document.body.classList.toggle("dark-theme");
} else if (currentTheme == "light") {
  document.body.classList.toggle("light-theme");
}

btn.addEventListener("click", function () {
  if (prefersDarkScheme.matches) {
    document.body.classList.toggle("light-theme");
    var theme = document.body.classList.contains("light-theme")
      ? "light"
      : "dark";
  } else {
    document.body.classList.toggle("dark-theme");
    var theme = document.body.classList.contains("dark-theme")
      ? "dark"
      : "light";
  }
  localStorage.setItem("theme", theme);
});
</script>   
</body>
</html>
